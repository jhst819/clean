<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>즐거운 목욕탕 - 머리 감기 게임 (태블릿용 4:3)</title>
    
    <!-- 스타일 및 기능 라이브러리 불러오기 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tone.js 사운드 라이브러리 (배경음 및 피드백) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>

    <style>
        /* 터치 시 화면 드래그나 확대 방지 (전자칠판/태블릿 최적화) */
        html, body {
            width: 100vw;
            height: 100vh;
            margin: 0;
            padding: 0;
            overflow: hidden; /* 화면 밖으로 넘어가는 것 완벽 차단 */
            background-color: #cbd5e1; /* 화면 밖 여백 배경색 */
            touch-action: none; 
            user-select: none; 
            -webkit-user-select: none; 
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        /* 거품 문지르기 영역에서 브라우저 기본 동작 차단 */
        .rub-area {
            touch-action: none;
        }
    </style>
</head>
<body>
    <div id="root" class="w-full h-full p-2 flex justify-center items-center"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const baseShopItems = [
            { id: 'shampoo', icon: '🧴', name: '샴푸', required: true },
            { id: 'towel', icon: '🧣', name: '수건', required: true }, // 두루마리 휴지 대신 수건/타올 이모지 변경
            { id: 'conditioner', icon: '🧴', name: '린스', required: true },
            { id: 'dryer', icon: '💨', name: '드라이기', required: true },
            { id: 'milk', icon: '🧃', name: '바나나우유', required: false },
            { id: 'egg', icon: '🥚', name: '구운계란', required: false },
            { id: 'sikhye', icon: '🥤', name: '식혜', required: false },
            { id: 'mud', icon: '🟤', name: '머드팩', required: false }
        ];

        function WashingHairGame() {
            const [step, setStep] = useState('intro'); // intro, shop, wet, pump, lather, rinse, done
            const [playerName, setPlayerName] = useState('');
            const [hairType, setHairType] = useState(null); // 'short', 'long'
            const [touchSense, setTouchSense] = useState(null); // 'sensitive', 'insensitive'
            
            // 매점 상태
            const [basket, setBasket] = useState([]);
            const [shopItems, setShopItems] = useState([]);
            
            // 물 적시기/온도 상태
            const [waterOn, setWaterOn] = useState(false);
            const [waterTemp, setWaterTemp] = useState(10); // 0(Cold) ~ 100(Hot)
            
            // 샴푸/거품 상태
            const [pumpCount, setPumpCount] = useState(0);
            const requiredPumps = hairType === 'long' ? 2 : 1;
            const [foamLevel, setFoamLevel] = useState(0); // 0 ~ 100

            // 사운드 상태
            const [isSoundOn, setIsSoundOn] = useState(false);
            const correctSynthRef = useRef(null);
            const incorrectSynthRef = useRef(null);
            const bubbleSynthRef = useRef(null);
            const bgmLoopRef = useRef(null);

            useEffect(() => {
                setShopItems([...baseShopItems].sort(() => Math.random() - 0.5));

                correctSynthRef.current = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.05, decay: 0.1, sustain: 0.3, release: 1 }
                }).toDestination();
                correctSynthRef.current.volume.value = -5;

                incorrectSynthRef.current = new Tone.Synth({
                    oscillator: { type: "sawtooth" },
                    envelope: { attack: 0.1, decay: 0.2, sustain: 0.1, release: 0.5 }
                }).toDestination();
                incorrectSynthRef.current.volume.value = -10;

                bubbleSynthRef.current = new Tone.MembraneSynth({
                    pitchDecay: 0.05, octaves: 2, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination();
                bubbleSynthRef.current.volume.value = -15;

                bgmLoopRef.current = new Tone.Loop((time) => {
                    const notes = ["C4", "E4", "G4", "C5"];
                    const randomNote = notes[Math.floor(Math.random() * notes.length)];
                    if (Math.random() > 0.3) {
                        bubbleSynthRef.current.triggerAttackRelease(randomNote, "32n", time);
                    }
                }, "8n");

                return () => {
                    bgmLoopRef.current?.dispose();
                    correctSynthRef.current?.dispose();
                    incorrectSynthRef.current?.dispose();
                    bubbleSynthRef.current?.dispose();
                };
            }, []);

            const toggleSound = async () => {
                if (!isSoundOn) {
                    await Tone.start();
                    Tone.Transport.start();
                    bgmLoopRef.current.start(0);
                    setIsSoundOn(true);
                } else {
                    Tone.Transport.pause();
                    bgmLoopRef.current.stop();
                    setIsSoundOn(false);
                }
            };

            const playSound = (type) => {
                if (!isSoundOn) return;
                try {
                    if (type === 'correct') {
                        correctSynthRef.current.triggerAttackRelease(["C5", "E5", "G5"], "8n");
                    } else if (type === 'incorrect') {
                        incorrectSynthRef.current.triggerAttackRelease("D2", "8n");
                    } else if (type === 'pop') {
                        bubbleSynthRef.current.triggerAttackRelease("C5", "32n");
                    }
                } catch (e) { console.log(e); }
            };

            const handleReset = () => {
                setStep('intro');
                setPlayerName('');
                setHairType(null);
                setTouchSense(null);
                setBasket([]);
                setShopItems([...baseShopItems].sort(() => Math.random() - 0.5));
                setWaterOn(false);
                setWaterTemp(10);
                setPumpCount(0);
                setFoamLevel(0);
            };

            const handlePrev = () => {
                if(step === 'shop') setStep('intro');
                else if(step === 'wet') setStep('shop');
                else if(step === 'pump') setStep('wet');
                else if(step === 'lather') setStep('pump');
                else if(step === 'rinse') setStep('lather');
            };

            const handleRubbing = (e) => {
                const fillRate = touchSense === 'sensitive' ? 3 : 0.5;
                if (step === 'lather') {
                    setFoamLevel((prev) => Math.min(prev + fillRate, 100));
                } else if (step === 'rinse' && waterOn && waterTemp >= 35 && waterTemp <= 65) {
                    setFoamLevel((prev) => Math.max(prev - fillRate, 0));
                }
            };

            const handleTempRelease = () => {
                if (waterOn) {
                    if (waterTemp >= 35 && waterTemp <= 65) playSound('correct');
                    else playSound('incorrect');
                }
            };

            const requiredItemsCount = basket.filter(id => baseShopItems.find(i => i.id === id)?.required).length;
            const wrongItemsCount = basket.filter(id => !baseShopItems.find(i => i.id === id)?.required).length;
            const isBasketPerfect = requiredItemsCount === 4 && wrongItemsCount === 0;
            const isTempPerfect = waterTemp >= 35 && waterTemp <= 65;

            let currentExpression = 'normal';
            if ((step === 'wet' || step === 'rinse') && waterOn) {
                if (waterTemp < 35) currentExpression = 'cold';
                else if (waterTemp > 65) currentExpression = 'hot';
                else currentExpression = 'happy';
            } else if (step === 'done') {
                currentExpression = 'happy';
            }

            // 캐릭터 헤더 크기를 태블릿 노스크롤 환경에 맞게 축소
            const CharacterHead = ({ foam, expression = 'normal', small = false }) => {
                let faceColor = 'bg-orange-200';
                let eyes = (
                    <React.Fragment>
                        <div className="w-3 h-3 bg-gray-800 rounded-full" />
                        <div className="w-3 h-3 bg-gray-800 rounded-full" />
                    </React.Fragment>
                );
                let mouth = null;

                if (expression === 'cold') {
                    faceColor = 'bg-blue-300';
                    eyes = (
                        <React.Fragment>
                            <span className="text-2xl font-bold text-gray-800">＞</span>
                            <span className="text-2xl font-bold text-gray-800">＜</span>
                        </React.Fragment>
                    );
                    mouth = <div className="text-xl font-bold text-blue-900 mt-1">〰️</div>;
                } else if (expression === 'hot') {
                    faceColor = 'bg-red-400';
                    eyes = (
                        <React.Fragment>
                            <span className="text-2xl font-bold text-gray-800">＞</span>
                            <span className="text-2xl font-bold text-gray-800">＜</span>
                        </React.Fragment>
                    );
                    mouth = <div className="text-xl font-bold text-red-900 mt-1">ㅁ</div>;
                } else if (expression === 'happy') {
                    faceColor = 'bg-orange-200';
                    eyes = (
                        <React.Fragment>
                            <span className="text-3xl font-bold text-gray-800 -translate-y-1">^</span>
                            <span className="text-3xl font-bold text-gray-800 -translate-y-1">^</span>
                        </React.Fragment>
                    );
                    mouth = <div className="text-xl font-bold text-orange-900 mt-1">▽</div>;
                }

                const scaleClass = small ? 'scale-75' : 'scale-100';

                return (
                <div className={`relative w-40 h-40 mx-auto flex flex-col items-center transform ${scaleClass}`}>
                    {hairType === 'long' && (
                    <div className="absolute top-1/2 left-2 right-2 h-28 bg-amber-800 rounded-b-3xl -z-10" />
                    )}
                    <div className="w-28 h-12 bg-amber-800 rounded-t-full z-10" />
                    <div className={`w-24 h-24 ${faceColor} rounded-b-full z-10 flex flex-col justify-center items-center transition-colors duration-500 shadow-md`}>
                        <div className="flex justify-center items-center gap-4 h-5 mt-1">
                            {eyes}
                        </div>
                        <div className="h-5 flex items-center justify-center mt-1">
                            {mouth}
                        </div>
                    </div>

                    {foam > 0 && (
                    <div 
                        className="absolute top-0 w-36 h-36 pointer-events-none z-20 flex flex-wrap justify-center items-center transition-opacity"
                        style={{ opacity: foam / 100 }}
                    >
                        <span className="text-4xl absolute -top-2 left-2">🫧</span>
                        <span className="text-5xl absolute top-2 right-0">🫧</span>
                        <span className="text-3xl absolute top-8 -left-2">🫧</span>
                        <span className="text-6xl absolute top-8 right-6">🫧</span>
                        <span className="text-4xl absolute top-16 left-6">🫧</span>
                        <span className="text-5xl absolute -top-4 left-10">🫧</span>
                    </div>
                    )}
                </div>
                );
            };

            return (
                // 4:3 비율 강제 고정 및 최대 높이 설정 (스크롤 방지)
                <div className="w-full max-w-5xl aspect-[4/3] max-h-[95vh] mx-auto bg-blue-50 text-gray-800 font-sans rounded-3xl shadow-2xl flex flex-col overflow-hidden select-none border-4 border-blue-300">
                    
                    {/* 상단 네비게이션 헤더 */}
                    <div className="bg-blue-500 text-white flex justify-between items-center px-4 py-2 rounded-t-2xl shrink-0 h-14">
                        <button onClick={handleReset} className="px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm md:text-base transition-colors flex items-center shadow">
                            ⟲ 처음으로
                        </button>
                        
                        <h1 className="text-lg md:text-2xl font-bold flex items-center gap-2">
                            🧼 즐거운 목욕탕 🧴
                            <button onClick={toggleSound} className={`ml-2 px-2 py-1 text-xs md:text-sm rounded-full border-2 transition-colors ${isSoundOn ? 'bg-yellow-400 border-yellow-500 text-yellow-900' : 'bg-gray-300 border-gray-400 text-gray-600'}`}>
                                {isSoundOn ? '🔊 소리 ON' : '🔇 소리 OFF'}
                            </button>
                        </h1>
                        
                        <button onClick={handlePrev} className={`px-3 py-1 bg-blue-600 hover:bg-blue-700 rounded-lg font-bold text-sm md:text-base transition-colors flex items-center shadow ${step === 'intro' || step === 'done' ? 'invisible' : 'visible'}`}>
                            ← 이전으로
                        </button>
                    </div>

                    {/* 메인 콘텐츠 영역 (Flex 레이아웃으로 공간 꽉 채우고 스크롤 제거) */}
                    <div className="flex-1 w-full h-full p-3 md:p-5 flex flex-col overflow-hidden justify-between">
                        
                        {/* ================= 도입부 ================= */}
                        {step === 'intro' && (
                            <div className="flex-1 flex flex-col justify-between items-center h-full py-2">
                                <h2 className="text-2xl md:text-3xl font-bold text-blue-800 shrink-0">게임을 준비해 볼까요?</h2>
                                
                                <div className="flex-1 flex flex-row w-full justify-center gap-3 md:gap-4 items-stretch my-2">
                                    {/* 이름 입력 */}
                                    <div className="flex flex-col items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border-2 border-green-200 flex-1">
                                        <h3 className="text-base md:text-xl font-bold bg-green-100 px-3 py-1 rounded-lg w-full text-center">1. 내 이름</h3>
                                        <div className="flex-1 flex items-center justify-center w-full">
                                            <input 
                                                type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} 
                                                placeholder="이름" 
                                                className="text-lg md:text-2xl p-2 md:p-3 border-4 border-gray-200 rounded-xl text-center w-full max-w-[150px] outline-none focus:border-green-400 transition-colors"
                                            />
                                        </div>
                                    </div>

                                    {/* 머리 스타일 선택 */}
                                    <div className="flex flex-col items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border-2 border-amber-200 flex-1">
                                        <h3 className="text-base md:text-xl font-bold bg-amber-100 px-3 py-1 rounded-lg w-full text-center">2. 머리 길이</h3>
                                        <div className="flex w-full justify-center gap-2 h-full">
                                            <button onClick={() => { setHairType('short'); playSound('pop'); }} className={`flex-1 p-2 border-4 rounded-xl flex flex-col justify-center items-center transition-all ${hairType === 'short' ? 'border-amber-500 bg-amber-50 scale-105 shadow-md' : 'border-gray-200 bg-white hover:bg-gray-50'}`}>
                                                <div className="text-4xl md:text-6xl mb-1">🧑</div>
                                                <span className="font-bold text-xs md:text-base">단발 머리</span>
                                            </button>
                                            <button onClick={() => { setHairType('long'); playSound('pop'); }} className={`flex-1 p-2 border-4 rounded-xl flex flex-col justify-center items-center transition-all ${hairType === 'long' ? 'border-amber-500 bg-amber-50 scale-105 shadow-md' : 'border-gray-200 bg-white hover:bg-gray-50'}`}>
                                                <div className="text-4xl md:text-6xl mb-1">👧</div>
                                                <span className="font-bold text-xs md:text-base">장발 머리</span>
                                            </button>
                                        </div>
                                    </div>

                                    {/* 터치 민감도 선택 */}
                                    <div className="flex flex-col items-center gap-2 bg-white p-3 rounded-2xl shadow-sm border-2 border-purple-200 flex-1">
                                        <h3 className="text-base md:text-xl font-bold bg-purple-100 px-3 py-1 rounded-lg w-full text-center">3. 터치 민감도</h3>
                                        <div className="flex w-full justify-center gap-2 h-full">
                                            <button onClick={() => { setTouchSense('sensitive'); playSound('pop'); }} className={`flex-1 p-2 border-4 rounded-xl flex flex-col justify-center items-center transition-all ${touchSense === 'sensitive' ? 'border-purple-500 bg-purple-50 scale-105 shadow-md' : 'border-gray-200 bg-white hover:bg-gray-50'}`}>
                                                <div className="text-3xl md:text-5xl mb-1">👆</div>
                                                <span className="font-bold text-xs md:text-base">예민 모드</span>
                                            </button>
                                            <button onClick={() => { setTouchSense('insensitive'); playSound('pop'); }} className={`flex-1 p-2 border-4 rounded-xl flex flex-col justify-center items-center transition-all ${touchSense === 'insensitive' ? 'border-purple-500 bg-purple-50 scale-105 shadow-md' : 'border-gray-200 bg-white hover:bg-gray-50'}`}>
                                                <div className="text-3xl md:text-5xl mb-1">🖐️</div>
                                                <span className="font-bold text-xs md:text-base">둔감 모드</span>
                                            </button>
                                        </div>
                                    </div>
                                </div>

                                <button 
                                    onClick={() => { setStep('shop'); playSound('correct'); }}
                                    disabled={!hairType || !touchSense || !playerName.trim()}
                                    className={`w-full max-w-sm py-3 md:py-4 rounded-xl font-bold text-lg md:text-2xl transition-all shrink-0 ${hairType && touchSense && playerName.trim() ? 'bg-blue-600 text-white hover:scale-105 cursor-pointer shadow-lg animate-pulse' : 'bg-gray-300 text-gray-500 cursor-not-allowed'}`}
                                >
                                    목욕탕으로 출발! ➔
                                </button>
                            </div>
                        )}

                        {/* ================= 1단계: 매점 ================= */}
                        {step === 'shop' && (
                            <div className="flex-1 flex flex-col justify-between h-full">
                                <h2 className="text-lg md:text-2xl font-bold text-center mb-2 bg-yellow-100 py-2 rounded-lg shrink-0">
                                    🛒 1단계: 목욕탕 매점 (필요한 물건 4가지를 담으세요)
                                </h2>
                                
                                <div className="flex-1 flex flex-row gap-3 min-h-0">
                                    {/* 왼쪽 아이템 목록 */}
                                    <div className="flex-[2] grid grid-cols-4 grid-rows-2 gap-2">
                                        {shopItems.map(item => (
                                            <button
                                                key={item.id}
                                                onClick={() => {
                                                    const isRequired = item.required;
                                                    if (basket.includes(item.id)) {
                                                        setBasket(basket.filter(i => i !== item.id));
                                                        playSound('pop');
                                                    } else {
                                                        setBasket([...basket, item.id]);
                                                        if (isRequired) playSound('correct');
                                                        else playSound('incorrect');
                                                    }
                                                }}
                                                className={`flex flex-col items-center justify-center p-2 rounded-xl border-4 transition-all h-full ${
                                                    basket.includes(item.id) ? 'border-green-500 bg-green-50 scale-95 shadow-inner' : 'border-gray-300 bg-white shadow-sm'
                                                }`}
                                            >
                                                <div className="text-3xl md:text-5xl mb-1">{item.icon}</div>
                                                <div className="text-sm md:text-lg font-bold text-center">{item.name}</div>
                                            </button>
                                        ))}
                                    </div>

                                    {/* 오른쪽 장바구니 */}
                                    <div className="flex-[1] flex flex-col justify-between bg-gray-100 rounded-xl border-4 border-dashed border-gray-400 p-3">
                                        <div className="flex flex-col items-center h-full">
                                            <h3 className="text-base md:text-xl font-bold mb-2">🧺 바구니</h3>
                                            <div className="flex flex-wrap justify-center gap-2 mb-auto w-full">
                                                {basket.length === 0 && <span className="text-gray-400 text-sm mt-2">비어있어요</span>}
                                                {basket.map(id => {
                                                    const item = shopItems.find(i => i.id === id);
                                                    return <div key={id} className="text-2xl md:text-4xl bg-white p-1 md:p-2 rounded-lg shadow border">{item.icon}</div>;
                                                })}
                                            </div>
                                        </div>

                                        <div className="w-full text-center shrink-0 mt-2">
                                            {wrongItemsCount > 0 && (
                                                <div className="text-red-500 font-bold text-xs md:text-sm bg-red-100 p-2 rounded-lg mb-2 shadow-sm animate-pulse">
                                                    필요 없는 물건이 있어요!
                                                </div>
                                            )}
                                            {isBasketPerfect ? (
                                                <button 
                                                    onClick={() => { setStep('wet'); playSound('correct'); }}
                                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold text-lg md:text-xl shadow-lg animate-bounce"
                                                >
                                                    들어가기 ➔
                                                </button>
                                            ) : (
                                                <div className="py-3 bg-gray-300 text-gray-500 rounded-xl font-bold text-lg md:text-xl">
                                                    {requiredItemsCount}/4 담음
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 2-1단계: 물 적시기 ================= */}
                        {step === 'wet' && (
                            <div className="flex-1 flex flex-col justify-between h-full">
                                <h2 className="text-lg md:text-2xl font-bold text-center mb-2 bg-blue-100 py-2 rounded-lg shrink-0">
                                    🚿 2단계: 머리 적시기 (따뜻한 물을 트세요)
                                </h2>
                                
                                <div className="flex-1 flex flex-row items-center justify-around h-full gap-4">
                                    {/* 좌측: 샤워기와 사람 모양 */}
                                    <div className="flex flex-col items-center relative h-full justify-center w-1/2">
                                        <button 
                                            onClick={() => { setWaterOn(!waterOn); playSound('pop'); }}
                                            className={`w-20 h-20 md:w-28 md:h-28 rounded-full flex flex-col justify-center items-center border-4 shadow-md transition-colors z-20 ${
                                                waterOn ? 'bg-blue-100 border-blue-400 scale-95' : 'bg-gray-100 border-gray-300'
                                            }`}
                                        >
                                            <span className="text-3xl md:text-4xl mb-1">🚿</span>
                                            <span className="font-bold text-xs md:text-sm">{waterOn ? '물 끄기' : '물 틀기'}</span>
                                        </button>
                                        
                                        <div className={`flex gap-2 md:gap-3 my-1 transition-opacity z-30 ${waterOn ? 'opacity-100' : 'opacity-0'}`}>
                                            <div className="w-1.5 h-10 md:h-16 bg-blue-400 animate-pulse"></div>
                                            <div className="w-1.5 h-16 md:h-24 bg-blue-500 animate-pulse delay-75"></div>
                                            <div className="w-1.5 h-10 md:h-16 bg-blue-400 animate-pulse delay-150"></div>
                                        </div>

                                        <div className="z-10 pointer-events-none mt-[-10px] md:mt-[-20px]">
                                            <CharacterHead foam={0} expression={currentExpression} small={true} />
                                        </div>
                                    </div>

                                    {/* 우측: 온도 조절기 */}
                                    <div className="flex flex-col justify-center items-center w-1/2 bg-white p-4 md:p-6 rounded-2xl shadow-sm border-4 border-gray-100 h-full">
                                        <label className="text-xl md:text-2xl font-bold mb-4">온도 조절하기</label>
                                        <input 
                                            type="range" min="0" max="100" value={waterTemp}
                                            onChange={(e) => setWaterTemp(parseInt(e.target.value))}
                                            onMouseUp={handleTempRelease}
                                            onTouchEnd={handleTempRelease}
                                            className="w-full h-5 md:h-6 bg-gradient-to-r from-blue-500 via-green-400 to-red-500 rounded-full appearance-none cursor-pointer outline-none shadow-inner mb-2"
                                        />
                                        <div className="w-full flex justify-between text-sm md:text-lg font-bold mb-4">
                                            <span className="text-blue-500">차가움</span>
                                            <span className="text-green-500">따뜻함</span>
                                            <span className="text-red-500">뜨거움</span>
                                        </div>

                                        <div className="h-14 flex items-center justify-center w-full mb-4">
                                            {waterOn && (
                                                <div className={`text-sm md:text-lg font-bold p-2 md:p-3 rounded-lg w-full text-center shadow-sm ${waterTemp < 35 ? 'bg-blue-100 text-blue-600' : waterTemp > 65 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                                    {waterTemp < 35 ? "앗, 차가워! 올리자." : waterTemp > 65 ? "앗, 뜨거워! 내리자." : "따뜻해요! 딱 맞아요."}
                                                </div>
                                            )}
                                        </div>

                                        {/* 다음 버튼이 밀리지 않고 고정 공간 차지 */}
                                        <div className="h-12 w-full flex items-end">
                                            {waterOn && isTempPerfect ? (
                                                <button 
                                                    onClick={() => { setStep('pump'); playSound('correct'); }}
                                                    className="w-full py-3 bg-green-500 text-white rounded-lg font-bold text-lg md:text-xl animate-pulse shadow-md"
                                                >
                                                    다음 단계 ➔
                                                </button>
                                            ) : (
                                                <div className="w-full py-3 bg-gray-200 text-gray-400 rounded-lg font-bold text-lg md:text-xl text-center">
                                                    온도를 맞춰주세요
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ================= 2-2단계: 샴푸 짜기 ================= */}
                        {step === 'pump' && (
                            <div className="flex-1 flex flex-col justify-between items-center h-full">
                                <h2 className="text-lg md:text-2xl font-bold text-center mb-2 bg-green-100 py-2 px-4 rounded-lg shadow-sm shrink-0 w-full">
                                    🧴 3단계: 내 머리 길이에 맞게 스스로 샴푸를 짜주세요!
                                </h2>
                                
                                <div className="flex-1 flex flex-col items-center justify-center">
                                    <div 
                                        className="relative cursor-pointer group flex flex-col items-center" 
                                        onClick={() => { setPumpCount(p => p + 1); playSound('pop'); }}
                                    >
                                        <div className="text-[7rem] md:text-[10rem] transition-transform group-active:scale-90 hover:scale-105">
                                            🧴
                                        </div>
                                        <div className="mt-2 text-lg md:text-2xl font-bold bg-white px-6 py-2 rounded-full shadow-sm border-2 border-green-200 animate-bounce text-green-700">
                                            펌프하기 (터치)
                                        </div>
                                    </div>

                                    {/* 짠 횟수 시각화 피드백 */}
                                    <div className="mt-4 text-lg md:text-xl font-bold bg-gray-100 px-4 py-2 rounded-lg border-2 border-gray-200">
                                        현재 <span className="text-green-600 text-2xl">{pumpCount}</span> 번 짰어요
                                    </div>
                                </div>

                                {/* 하단 고정 버튼 영역 (성공 OR 다시하기) */}
                                <div className="h-20 w-full flex justify-center items-center shrink-0">
                                    {pumpCount === requiredPumps && (
                                        <button 
                                            onClick={() => { setStep('lather'); playSound('correct'); }}
                                            className="w-3/4 py-3 md:py-4 bg-green-500 text-white rounded-xl font-bold text-lg md:text-2xl shadow-md animate-pulse"
                                        >
                                            알맞게 짰어요! 거품내기 ➔
                                        </button>
                                    )}
                                    {pumpCount > requiredPumps && (
                                        <div className="w-full flex justify-center gap-4">
                                            <div className="flex items-center text-red-500 font-bold text-sm md:text-lg bg-red-100 px-4 py-3 rounded-xl shadow-sm">
                                                앗! 너무 많이 짰어요!
                                            </div>
                                            <button 
                                                onClick={() => { setPumpCount(0); playSound('pop'); }}
                                                className="px-6 py-3 bg-red-500 text-white rounded-xl font-bold text-sm md:text-lg shadow-md hover:bg-red-600"
                                            >
                                                다시 짜기 ⟲
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= 2-3단계: 거품 내기 ================= */}
                        {step === 'lather' && (
                            <div className="flex-1 flex flex-col justify-between h-full">
                                <h2 className="text-lg md:text-2xl font-bold text-center mb-2 bg-purple-100 py-2 rounded-lg pointer-events-none shrink-0 shadow-sm">
                                    🫧 4단계: 머리를 마구 문질러 거품을 내주세요!
                                </h2>

                                <div className="w-full bg-gray-200 rounded-full h-6 md:h-8 mb-2 pointer-events-none shadow-inner shrink-0 border-2 border-gray-300 overflow-hidden">
                                    <div 
                                        className="bg-gradient-to-r from-purple-400 to-purple-600 h-full transition-all duration-200 flex items-center justify-center text-xs md:text-sm text-white font-bold"
                                        style={{ width: `${Math.max(foamLevel, 5)}%` }}
                                    >
                                        {foamLevel >= 100 ? '거품 완성!' : `${Math.floor(foamLevel)}%`}
                                    </div>
                                </div>

                                <div 
                                    className="flex-1 w-full flex justify-center items-center bg-purple-50 rounded-2xl border-4 md:border-8 border-dashed border-purple-300 cursor-pointer rub-area overflow-hidden"
                                    onMouseMove={handleRubbing}
                                    onTouchMove={handleRubbing}
                                >
                                    <CharacterHead foam={foamLevel} />
                                </div>

                                <div className="h-14 w-full flex items-center justify-center shrink-0 mt-2">
                                    {foamLevel >= 100 ? (
                                        <button 
                                            onClick={() => { setStep('rinse'); setWaterOn(false); setWaterTemp(10); playSound('correct'); }}
                                            className="w-3/4 py-3 bg-purple-600 text-white rounded-xl font-bold text-lg md:text-xl shadow-md animate-pulse"
                                        >
                                            헹구러 가기 ➔
                                        </button>
                                    ) : (
                                        <div className="text-gray-400 font-bold text-sm">화면의 머리를 문질러주세요</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= 2-4단계: 헹구기 ================= */}
                        {step === 'rinse' && (
                            <div className="flex-1 flex flex-col justify-between h-full">
                                <h2 className="text-lg md:text-2xl font-bold text-center mb-2 bg-cyan-100 py-2 rounded-lg pointer-events-none shrink-0 shadow-sm">
                                    💦 5단계: 따뜻한 물을 켜고 문질러서 거품 없애기!
                                </h2>

                                <div className="flex-1 flex flex-row gap-4 h-full">
                                    {/* 왼쪽: 샤워기 및 온도 조절 (공간 압축) */}
                                    <div className="w-[30%] flex flex-col items-center justify-center bg-white p-3 md:p-4 rounded-2xl shadow-sm border-4 border-cyan-100 h-full">
                                        <button 
                                            onClick={() => { setWaterOn(!waterOn); playSound('pop'); }}
                                            className={`w-16 h-16 md:w-24 md:h-24 rounded-full flex flex-col justify-center items-center border-4 shadow-sm transition-colors mb-4 z-20 ${
                                                waterOn ? 'bg-cyan-100 border-cyan-400 scale-95' : 'bg-gray-100 border-gray-300'
                                            }`}
                                        >
                                            <span className="text-2xl md:text-4xl mb-1">🚿</span>
                                            <span className="font-bold text-[10px] md:text-sm">{waterOn ? '물 끄기' : '물 켜기'}</span>
                                        </button>

                                        <label className="text-sm md:text-lg font-bold mb-2">온도 조절</label>
                                        <input 
                                            type="range" min="0" max="100" value={waterTemp}
                                            onChange={(e) => setWaterTemp(parseInt(e.target.value))}
                                            onMouseUp={handleTempRelease}
                                            onTouchEnd={handleTempRelease}
                                            className="w-full h-4 bg-gradient-to-r from-blue-500 via-green-400 to-red-500 rounded-full appearance-none cursor-pointer outline-none mb-2 shadow-inner"
                                        />
                                        
                                        <div className="h-10 flex items-center justify-center w-full">
                                            {waterOn && (
                                                <div className={`text-xs md:text-sm font-bold p-1 md:p-2 rounded-lg w-full text-center ${waterTemp < 35 ? 'bg-blue-100 text-blue-600' : waterTemp > 65 ? 'bg-red-100 text-red-600' : 'bg-green-100 text-green-600'}`}>
                                                    {waterTemp < 35 ? "차가워요!" : waterTemp > 65 ? "뜨거워요!" : "따뜻해요!"}
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* 오른쪽: 거품 바 및 머리 헹구기 영역 */}
                                    <div className="flex-1 flex flex-col overflow-hidden h-full">
                                        <div className="w-full bg-cyan-200 rounded-full h-6 md:h-8 mb-2 pointer-events-none relative overflow-hidden shadow-inner border-2 border-cyan-300 shrink-0">
                                            <div 
                                                className="bg-gray-100 h-full absolute right-0 transition-all duration-200"
                                                style={{ width: `${100 - foamLevel}%` }}
                                            ></div>
                                            <div className="absolute inset-0 flex items-center justify-center text-xs md:text-sm font-bold text-cyan-900">
                                                {foamLevel <= 0 ? '깨끗해졌어요!' : '거품 문지르기'}
                                            </div>
                                        </div>

                                        <div 
                                            className="flex-1 w-full flex justify-center items-center bg-cyan-50 rounded-2xl border-4 md:border-8 border-dashed border-cyan-300 relative cursor-pointer rub-area overflow-hidden"
                                            onMouseMove={handleRubbing}
                                            onTouchMove={handleRubbing}
                                        >
                                            {waterOn && (
                                                <div className="absolute top-4 flex gap-4 md:gap-6 pointer-events-none z-30 opacity-70">
                                                    <div className="w-1.5 md:w-2 h-24 md:h-32 bg-cyan-400 animate-pulse"></div>
                                                    <div className="w-1.5 md:w-2 h-32 md:h-40 bg-cyan-300 animate-pulse delay-75"></div>
                                                    <div className="w-1.5 md:w-2 h-28 md:h-36 bg-cyan-500 animate-pulse delay-150"></div>
                                                </div>
                                            )}
                                            <CharacterHead foam={foamLevel} expression={currentExpression} small={true} />
                                        </div>
                                    </div>
                                </div>

                                <div className="h-14 w-full flex items-center justify-center shrink-0 mt-2">
                                    {foamLevel <= 0 ? (
                                        <button 
                                            onClick={() => { setStep('done'); playSound('correct'); }}
                                            className="w-3/4 py-3 bg-cyan-600 text-white rounded-xl font-bold text-lg md:text-xl shadow-md animate-bounce"
                                        >
                                            목욕 완료 ➔
                                        </button>
                                    ) : (
                                        <div className="text-gray-400 font-bold text-sm">거품이 모두 사라질 때까지 문질러주세요</div>
                                    )}
                                </div>
                            </div>
                        )}

                        {/* ================= 성공 화면 ================= */}
                        {step === 'done' && (
                            <div className="flex-1 flex flex-col items-center justify-center h-full">
                                <div className="text-5xl md:text-7xl mb-4 animate-bounce">✨🛁✨</div>
                                <h2 className="text-2xl md:text-4xl font-bold text-blue-700 mb-4 text-center">샴푸왕 {playerName || '친구'}! 참 잘했어요!</h2>
                                
                                <div className="text-sm md:text-lg text-gray-800 mb-6 bg-yellow-100 p-4 md:p-6 rounded-2xl border-4 border-yellow-300 shadow-sm text-center leading-relaxed max-w-2xl">
                                    장바구니에 물건도 잘 챙겼고,<br/>
                                    따뜻한 온도로 물을 맞춰 스스로 샴푸를 짰어요.<br/>
                                    깨끗하게 머리를 감은 우리 친구 최고예요!
                                </div>

                                <button 
                                    onClick={handleReset}
                                    className="px-8 md:px-12 py-3 md:py-4 bg-yellow-400 text-yellow-900 hover:bg-yellow-500 rounded-2xl font-bold text-lg md:text-2xl shadow-md transition-transform hover:scale-105"
                                >
                                    다시 한 번 해볼까요? ⟲
                                </button>
                            </div>
                        )}

                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WashingHairGame />);
    </script>
</body>
</html>
